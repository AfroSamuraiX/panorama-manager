name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read
  issues: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  get-next-version:
    uses: semantic-release-action/next-release-version/.github/workflows/next-release-version.yml@v4

  build-release-binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs:
      - get-next-version
    if: needs.get-next-version.outputs.new-release-published == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install semantic-release-cargo
        uses: EricCrosson/install-github-release-binary@v2
        with:
          targets: semantic-release-cargo/semantic-release-cargo@v2

      - name: Prepare Cargo manifests for next version
        run: semantic-release-cargo prepare ${{ needs.get-next-version.outputs.new-release-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/panorama-gui/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev

      - name: Build release artifacts
        run: |
          version="v${{ needs.get-next-version.outputs.new-release-version }}"
          PANORAMA_VERSION="${version}" scripts/package-release.sh --gui

      - name: Package release artifacts
        run: |
          version="v${{ needs.get-next-version.outputs.new-release-version }}"
          ls -lh dist/*"${version}"-linux-x86_64.tar.gz dist/*"${version}"-linux-x86_64.sha256

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/pctl-v*-linux-x86_64.tar.gz
            dist/pctl-v*-linux-x86_64.sha256
            dist/panorama-gui-v*-linux-x86_64.tar.gz
            dist/panorama-gui-v*-linux-x86_64.sha256

  release:
    name: Semantic release
    runs-on: ubuntu-latest
    needs:
      - get-next-version
      - build-release-binaries
    if: needs.get-next-version.outputs.new-release-published == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Run semantic-release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-release-assets:
    name: Verify published release assets
    runs-on: ubuntu-latest
    needs:
      - get-next-version
      - release
    if: needs.get-next-version.outputs.new-release-published == 'true'

    steps:
      - name: Verify archive checksum and binary execution
        run: |
          tag="v${{ needs.get-next-version.outputs.new-release-version }}"
          base_url="https://github.com/${{ github.repository }}/releases/download/${tag}"
          pctl_archive="pctl-${tag}-linux-x86_64.tar.gz"
          pctl_checksum="pctl-${tag}-linux-x86_64.sha256"
          gui_archive="panorama-gui-${tag}-linux-x86_64.tar.gz"
          gui_checksum="panorama-gui-${tag}-linux-x86_64.sha256"
          curl -fL -o "/tmp/${pctl_archive}" "${base_url}/${pctl_archive}"
          curl -fL -o "/tmp/${pctl_checksum}" "${base_url}/${pctl_checksum}"
          curl -fL -o "/tmp/${gui_archive}" "${base_url}/${gui_archive}"
          curl -fL -o "/tmp/${gui_checksum}" "${base_url}/${gui_checksum}"
          (cd /tmp && sha256sum -c "${pctl_checksum}" && sha256sum -c "${gui_checksum}")
          tar -xzf "/tmp/${pctl_archive}" -C /tmp
          tar -xzf "/tmp/${gui_archive}" -C /tmp
          /tmp/pctl --help >/dev/null
          test -x /tmp/panorama-gui
          test -f /tmp/panorama-mgr.png
          test -f /tmp/panorama-mgr.desktop
